services:
  api:
    build: .
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-MaxBridge}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-maxbridge}:${POSTGRES_PASSWORD:-maxbridge}@postgres:5432/${POSTGRES_DB:-maxbridge}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://maxbridge.app}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-MaxBridgeBot}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-000000:replace-me}
      TELEGRAM_DROP_PENDING_UPDATES: ${TELEGRAM_DROP_PENDING_UPDATES:-true}
      MAX_MESSAGE_LENGTH: ${MAX_MESSAGE_LENGTH:-4000}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_MAX_MESSAGES: ${RATE_LIMIT_MAX_MESSAGES:-20}
    command: sh -c "alembic upgrade head && uvicorn maxbridge.main:create_app --factory --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 12

  telegram-poller:
    build: .
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-MaxBridge}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-maxbridge}:${POSTGRES_PASSWORD:-maxbridge}@postgres:5432/${POSTGRES_DB:-maxbridge}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://maxbridge.app}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-MaxBridgeBot}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-000000:replace-me}
      TELEGRAM_DROP_PENDING_UPDATES: ${TELEGRAM_DROP_PENDING_UPDATES:-true}
      MAX_MESSAGE_LENGTH: ${MAX_MESSAGE_LENGTH:-4000}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_MAX_MESSAGES: ${RATE_LIMIT_MAX_MESSAGES:-20}
    command: python -m maxbridge.bot.polling
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maxbridge}
      POSTGRES_USER: ${POSTGRES_USER:-maxbridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maxbridge}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
